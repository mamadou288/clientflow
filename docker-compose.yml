# Orchestration de développement : Postgres + Django + Vite.
# Lancer : docker compose up   (Ctrl-C pour arrêter, docker compose down pour nettoyer)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clientflow
      POSTGRES_USER: clientflow
      POSTGRES_PASSWORD: clientflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Le backend attend que la base réponde vraiment avant de démarrer.
      test: ["CMD-SHELL", "pg_isready -U clientflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    # En dev : serveur Django auto-reload (remplace le gunicorn du Dockerfile).
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgres://clientflow:clientflow@db:5432/clientflow
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app        # code monté → reload à chaud du back
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app       # code monté → hot-reload
      - /app/node_modules     # volume anonyme : garde les node_modules Linux de l'image
                              # (ne pas écraser avec ceux de l'hôte, compilés pour macOS)
    ports:
      # Publié sur le loopback IPv4 : notre app est joignable de façon déterministe
      # sur http://127.0.0.1:5173 (bon défaut de sécurité pour un serveur de dev).
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
